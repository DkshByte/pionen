<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black: #000000;
            --gray-1: #0a0a0a;
            --gray-2: #141414;
            --gray-3: #1c1c1c;
            --gray-4: #2a2a2a;
            --gray-5: #3a3a3a;
            --white: #ffffff;
            --white-80: rgba(255, 255, 255, 0.8);
            --white-50: rgba(255, 255, 255, 0.5);
            --white-20: rgba(255, 255, 255, 0.2);
            --white-10: rgba(255, 255, 255, 0.1);
            --white-05: rgba(255, 255, 255, 0.05);
            --blue: #0a84ff;
            --red: #ff453a;
            --green: #30d158;
        }

        html,
        body {
            height: 100%;
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.4;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-4);
            border-radius: 3px;
        }

        /* Auth */
        .auth {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-logo {
            width: 72px;
            height: 72px;
            background: var(--white-10);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 28px;
        }

        .auth h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth p {
            color: var(--white-50);
            margin-bottom: 36px;
            text-align: center;
        }

        .auth input {
            width: 300px;
            padding: 16px 20px;
            background: var(--gray-2);
            border: 1px solid var(--gray-4);
            border-radius: 14px;
            color: var(--white);
            font-size: 18px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        .auth input::placeholder {
            color: var(--white-20);
            letter-spacing: 0;
            font-family: inherit;
        }

        .auth-error {
            color: var(--red);
            font-size: 13px;
            margin-top: 16px;
        }

        /* App */
        .app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--white-05);
            background: var(--black);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .badge {
            padding: 5px 12px;
            background: var(--green);
            color: var(--black);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .file-count {
            color: var(--white-50);
            font-size: 14px;
        }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Upload */
        .upload-area {
            border: 1px dashed var(--gray-4);
            border-radius: 20px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 32px;
        }

        .upload-area:hover,
        .upload-area.drag {
            border-color: var(--blue);
            background: rgba(10, 132, 255, 0.05);
            border-style: solid;
        }

        .upload-area input {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .upload-area h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .upload-area p {
            font-size: 14px;
            color: var(--white-50);
        }

        /* Progress */
        .progress-bar {
            height: 4px;
            background: var(--gray-3);
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #5ac8fa);
            width: 0;
            transition: width 0.3s ease;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }

        @media (min-width: 640px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }
        }

        /* Card */
        .card {
            background: var(--gray-1);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-preview {
            aspect-ratio: 1;
            background: var(--gray-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            overflow: hidden;
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-preview img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 14px 16px;
        }

        .card-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .card-meta {
            font-size: 12px;
            color: var(--white-50);
        }

        /* Empty */
        .empty {
            text-align: center;
            padding: 100px 20px;
            color: var(--white-50);
        }

        .empty-icon {
            font-size: 64px;
            opacity: 0.2;
            margin-bottom: 20px;
        }

        .empty h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--white);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 80px;
            color: var(--white-50);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--gray-4);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Viewer */
        .viewer {
            position: fixed;
            inset: 0;
            background: var(--black);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .viewer.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .viewer-title {
            font-size: 15px;
            font-weight: 500;
            max-width: 50%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .viewer-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s ease;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
        }

        .btn-ghost {
            background: var(--white-10);
            color: var(--white);
            backdrop-filter: blur(10px);
        }

        .btn-ghost:hover {
            background: var(--white-20);
        }

        .viewer-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 60px 20px 20px;
        }

        .viewer-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            border-radius: 4px;
        }

        .viewer-content video {
            max-width: 100%;
            max-height: 100%;
            outline: none;
            border-radius: 8px;
        }

        .viewer-content audio {
            min-width: 360px;
        }

        .viewer-content iframe {
            width: 90%;
            height: 90%;
            border: none;
            border-radius: 12px;
            background: white;
        }

        .viewer-content pre {
            max-width: 90%;
            max-height: 90%;
            padding: 28px;
            background: var(--gray-2);
            border-radius: 16px;
            overflow: auto;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        /* Nav Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 52px;
            height: 52px;
            background: var(--white-10);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            color: var(--white);
            font-size: 22px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.15s;
            z-index: 5;
        }

        .viewer:hover .nav-btn {
            opacity: 1;
        }

        .nav-btn:hover {
            background: var(--white-20);
        }

        .nav-prev {
            left: 20px;
        }

        .nav-next {
            right: 20px;
        }

        .viewer-counter {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white-10);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            color: var(--white-80);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--gray-3);
            padding: 14px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            animation: slideUp 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .toast.success {
            background: var(--green);
            color: var(--black);
        }

        .toast.error {
            background: var(--red);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="auth" id="auth">
        <div class="auth-logo">🔐</div>
        <h1>Vault</h1>
        <p>Enter access token from your phone</p>
        <input type="password" id="token" placeholder="••••••••" autocomplete="off" autofocus>
        <div class="auth-error hidden" id="auth-error"></div>
    </div>

    <div class="app" id="app">
        <div class="header">
            <div class="header-left">
                <span class="logo">Vault</span>
                <span class="badge">Encrypted</span>
            </div>
            <span class="file-count" id="count">—</span>
        </div>

        <div class="content">
            <div class="upload-area" id="upload" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">⬆</div>
                <h3>Drop files to encrypt</h3>
                <p>or click to browse</p>
                <input type="file" id="file-input" multiple>
            </div>

            <div class="progress-bar hidden" id="progress">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading files...</p>
            </div>

            <div class="grid hidden" id="grid"></div>

            <div class="empty hidden" id="empty">
                <div class="empty-icon">📁</div>
                <h3>Your vault is empty</h3>
                <p>Drop files above to encrypt them</p>
            </div>
        </div>
    </div>

    <div class="viewer" id="viewer">
        <div class="viewer-header">
            <span class="viewer-title" id="viewer-title">File</span>
            <div class="viewer-actions">
                <button class="btn btn-icon btn-ghost" onclick="downloadCurrent()" title="Download">⬇</button>
                <button class="btn btn-icon btn-ghost" onclick="closeViewer()" title="Close">✕</button>
            </div>
        </div>
        <div class="viewer-content" id="viewer-content"></div>
        <button class="nav-btn nav-prev" onclick="navPrev()">‹</button>
        <button class="nav-btn nav-next" onclick="navNext()">›</button>
        <div class="viewer-counter hidden" id="viewer-counter"></div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        let token = '';
        let files = [];
        let currentIndex = -1;

        document.getElementById('token').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        function login() {
            token = document.getElementById('token').value.trim();
            if (!token) return;

            fetch('/api/auth', {
                method: 'POST',
                headers: { 'X-Access-Token': token }
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('auth').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        loadFiles();
                    } else {
                        showError('Invalid token');
                    }
                })
                .catch(() => showError('Connection failed'));
        }

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function loadFiles() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('grid').classList.add('hidden');
            document.getElementById('empty').classList.add('hidden');

            fetch('/api/files', { headers: { 'X-Access-Token': token } })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').classList.add('hidden');
                    files = data.files || [];

                    document.getElementById('count').textContent = files.length + ' file' + (files.length !== 1 ? 's' : '');

                    if (files.length === 0) {
                        document.getElementById('empty').classList.remove('hidden');
                        return;
                    }

                    document.getElementById('grid').classList.remove('hidden');
                    renderGrid();
                });
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = files.map((f, i) => `
                <div class="card" onclick="openViewer(${i})">
                    <div class="card-preview">
                        ${f.mimeType.startsWith('image/') ?
                    `<img src="/api/files/${f.id}/view?token=${token}" loading="lazy" alt="">` :
                    getIcon(f.mimeType)}
                    </div>
                    <div class="card-info">
                        <div class="card-name">${esc(f.name)}</div>
                        <div class="card-meta">${f.formattedSize}</div>
                    </div>
                </div>
            `).join('');
        }

        function getIcon(mime) {
            if (mime.startsWith('image/')) return '🖼';
            if (mime.startsWith('video/')) return '▶️';
            if (mime.startsWith('audio/')) return '🎵';
            if (mime.includes('pdf')) return '📄';
            if (mime.includes('text')) return '📝';
            if (mime.includes('zip') || mime.includes('rar')) return '📦';
            return '📁';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function openViewer(index) {
            if (files.length === 0) return;
            currentIndex = index;
            showFile(files[index]);
            document.getElementById('viewer').classList.add('open');
            document.body.style.overflow = 'hidden';
            updateCounter();
        }

        function closeViewer() {
            document.getElementById('viewer').classList.remove('open');
            document.getElementById('viewer-content').innerHTML = '';
            document.body.style.overflow = '';
            currentIndex = -1;
        }

        function navPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                showFile(files[currentIndex]);
                updateCounter();
            }
        }

        function navNext() {
            if (currentIndex < files.length - 1) {
                currentIndex++;
                showFile(files[currentIndex]);
                updateCounter();
            }
        }

        function updateCounter() {
            const el = document.getElementById('viewer-counter');
            if (files.length > 1) {
                el.textContent = (currentIndex + 1) + ' / ' + files.length;
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        function showFile(f) {
            const content = document.getElementById('viewer-content');
            const url = '/api/files/' + f.id + '/view?token=' + token;

            document.getElementById('viewer-title').textContent = f.name;
            content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            if (f.mimeType.startsWith('image/')) {
                const img = new Image();
                img.onload = () => { content.innerHTML = ''; content.appendChild(img); };
                img.onerror = () => content.innerHTML = '<p style="color:var(--white-50)">Failed to load image</p>';
                img.src = url;
            } else if (f.mimeType.startsWith('video/')) {
                content.innerHTML = `<video controls autoplay playsinline><source src="${url}" type="${f.mimeType}"></video>`;
            } else if (f.mimeType.startsWith('audio/')) {
                content.innerHTML = `<audio controls autoplay><source src="${url}" type="${f.mimeType}"></audio>`;
            } else if (f.mimeType.includes('pdf')) {
                content.innerHTML = `<iframe src="${url}"></iframe>`;
            } else if (f.mimeType.includes('text')) {
                fetch(url).then(r => r.text()).then(txt => {
                    content.innerHTML = '<pre></pre>';
                    content.querySelector('pre').textContent = txt;
                }).catch(() => content.innerHTML = '<p style="color:var(--white-50)">Failed to load</p>');
            } else {
                content.innerHTML = '<div style="text-align:center;color:var(--white-50)"><p style="font-size:48px;margin-bottom:16px;">📁</p><p>Preview not available</p><p style="font-size:13px;margin-top:8px">Click download to view this file</p></div>';
            }
        }

        function downloadCurrent() {
            if (currentIndex >= 0) download(files[currentIndex]);
        }

        function download(f) {
            const a = document.createElement('a');
            a.href = '/api/files/' + f.id + '/download?token=' + token;
            a.download = f.name;
            a.click();
            toast('Downloading ' + f.name);
        }

        // Upload
        const uploadArea = document.getElementById('upload');
        const fileInput = document.getElementById('file-input');

        ['dragenter', 'dragover'].forEach(e => uploadArea.addEventListener(e, ev => {
            ev.preventDefault();
            uploadArea.classList.add('drag');
        }));

        ['dragleave', 'drop'].forEach(e => uploadArea.addEventListener(e, ev => {
            ev.preventDefault();
            uploadArea.classList.remove('drag');
        }));

        uploadArea.addEventListener('drop', e => {
            if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) uploadFiles(e.target.files);
        });

        function uploadFiles(fileList) {
            const progress = document.getElementById('progress');
            const fill = document.getElementById('progress-fill');
            let i = 0;

            function next() {
                if (i >= fileList.length) {
                    progress.classList.add('hidden');
                    fill.style.width = '0';
                    loadFiles();
                    return;
                }

                const file = fileList[i];
                progress.classList.remove('hidden');

                const form = new FormData();
                form.append('file', file);
                form.append('filename', file.name);

                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/upload');
                xhr.setRequestHeader('X-Access-Token', token);

                xhr.upload.onprogress = e => {
                    if (e.lengthComputable) {
                        fill.style.width = Math.round(e.loaded / e.total * 100) + '%';
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        toast('Encrypted: ' + file.name, 'success');
                    } else {
                        toast('Failed: ' + file.name, 'error');
                    }
                    i++;
                    next();
                };

                xhr.onerror = () => {
                    toast('Upload failed', 'error');
                    i++;
                    next();
                };

                xhr.send(form);
            }

            next();
        }

        function toast(msg, type = '') {
            const el = document.createElement('div');
            el.className = 'toast ' + type;
            el.textContent = msg;
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.3s';
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (currentIndex >= 0) {
                if (e.key === 'Escape') closeViewer();
                if (e.key === 'ArrowLeft') navPrev();
                if (e.key === 'ArrowRight') navNext();
            }
        });

        // Touch swipe for gallery
        let touchStartX = 0;
        document.getElementById('viewer-content').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.getElementById('viewer-content').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) navPrev();
                else navNext();
            }
        }, { passive: true });
    </script>
</body>

</html>
