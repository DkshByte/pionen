<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Reset ─────────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --black: #000000;
            --black2: #030303;
            --black3: #080808;
            --green: #00ff88;
            --green-dim: #00cc6a;
            --green-glow: #00ff8844;
            --glass-bg: rgba(0, 255, 136, 0.025);
            --glass-bd: rgba(0, 255, 136, 0.07);
            --glass-hl: rgba(0, 255, 136, 0.14);
            --white: #f0fff8;
            --white-50: rgba(240, 255, 248, 0.5);
            --gray: #71717a;
            --mono: 'JetBrains Mono', monospace;
            --head: 'Space Grotesk', sans-serif;
            --red: #ff453a;
        }

        html, body {
            height: 100%;
            background: var(--black);
            color: var(--white);
            font-family: var(--head);
            font-size: 15px;
            line-height: 1.4;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Scanline retro overlay + Noise ────────────────────── */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 136, 0.012) 2px, rgba(0, 255, 136, 0.012) 4px);
            pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            background-size: 200px 200px; pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }

        /* ── Core Glass ────────────────────────────────────────── */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid var(--glass-bd);
            overflow: hidden;
            transition: border-color 0.35s, box-shadow 0.35s, transform 0.35s;
        }

        /* Auth */
        .auth { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .auth-logo { width: 72px; height: 72px; background: rgba(0, 255, 136, 0.05); border: 1px solid var(--glass-bd); border-radius: 12px; display: grid; place-items: center; font-size: 32px; margin-bottom: 28px; box-shadow: 0 0 20px var(--green-glow); }
        .auth h1 { font-family: var(--head); font-size: 36px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .auth p { font-family: var(--mono); color: var(--green); opacity: 0.7; margin-bottom: 36px; text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        .auth input {
            width: 320px; padding: 18px 20px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-bd);
            border-radius: 10px; color: var(--green); font-size: 22px; font-family: var(--mono);
            text-align: center; letter-spacing: 6px; outline: none; transition: all 0.2s;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
        }
        .auth input:focus { border-color: var(--green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2), inset 0 0 20px rgba(0, 255, 136, 0.1); }
        .auth input::placeholder { color: rgba(0, 255, 136, 0.2); letter-spacing: 2px; }
        .auth-error { color: var(--red); font-family: var(--mono); font-size: 13px; margin-top: 16px; letter-spacing: 0.05em; text-transform: uppercase; }

        /* App */
        .app { display: none; height: 100vh; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; border-bottom: 1px solid var(--glass-bd); background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo { font-family: var(--mono); font-size: 18px; font-weight: 600; letter-spacing: 0.08em; color: var(--green); }
        .badge { padding: 5px 12px; background: rgba(0, 255, 136, 0.06); border: 1px solid rgba(0, 255, 136, 0.15); color: var(--green); border-radius: 4px; font-family: var(--mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; }
        .file-count { color: var(--white-50); font-family: var(--mono); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }

        .content { flex: 1; overflow-y: auto; padding: 32px; }

        /* Upload Area */
        .upload-area {
            border: 1px dashed rgba(0, 255, 136, 0.3); border-radius: 16px; padding: 48px; text-align: center;
            cursor: pointer; transition: all 0.2s ease; margin-bottom: 40px; background: rgba(0, 255, 136, 0.02);
        }
        .upload-area:hover, .upload-area.drag { border-color: var(--green); background: rgba(0, 255, 136, 0.06); box-shadow: 0 0 30px var(--green-glow); }
        .upload-area input { display: none; }
        .upload-icon { font-size: 40px; margin-bottom: 16px; color: var(--green); filter: drop-shadow(0 0 10px var(--green-glow)); }
        .upload-area h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; font-family: var(--head); color: var(--white); }
        .upload-area p { font-size: 13px; color: var(--green); opacity: 0.7; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; }

        .progress-bar { height: 4px; background: var(--glass-bd); margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--green); width: 0; transition: width 0.3s ease; box-shadow: 0 0 15px var(--green); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
        
        .card { @extend .glass; background: var(--glass-bg); border: 1px solid var(--glass-bd); border-radius: 12px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
        .card:hover { transform: translateY(-4px); border-color: var(--green); box-shadow: 0 0 30px var(--green-glow), 0 10px 40px rgba(0,0,0,0.8); }
        .card:active { transform: scale(0.98); }
        
        .card-preview { aspect-ratio: 1; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 48px; border-bottom: 1px solid var(--glass-bd); overflow: hidden; position: relative; }
        .card-preview img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .card:hover .card-preview img { transform: scale(1.05); }
        
        .card-info { padding: 16px; background: rgba(0,0,0,0.6); }
        .card-name { font-family: var(--mono); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; color: var(--green); letter-spacing: -0.02em; }
        .card-meta { font-family: var(--mono); font-size: 11px; color: var(--white-50); letter-spacing: 0.05em; }

        /* Empty / Loading states */
        .empty, .loading { text-align: center; padding: 100px 20px; font-family: var(--mono); }
        .empty-icon { font-size: 64px; color: var(--green); opacity: 0.3; filter: drop-shadow(0 0 20px var(--green)); margin-bottom: 24px; }
        .empty h3 { font-size: 18px; color: var(--white); margin-bottom: 12px; font-family: var(--head); }
        .empty p { color: var(--green); opacity: 0.6; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        .spinner { width: 36px; height: 36px; border: 2px solid var(--glass-bd); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; box-shadow: 0 0 15px var(--green-glow); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Viewer Overflow Frame */
        .viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 100; display: none; flex-direction: column; }
        .viewer.open { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(20px); } }

        .viewer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: absolute; top: 0; left: 0; right: 0; z-index: 10; border-bottom: 1px solid var(--glass-bd); }
        .viewer-title { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--green); max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.05em; }
        .viewer-actions { display: flex; gap: 12px; }

        /* Button Glassmorphism */
        .btn { padding: 10px 18px; border: 1px solid var(--glass-bd); border-radius: 8px; font-family: var(--mono); font-size: 13px; text-transform: uppercase; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; letter-spacing: 0.1em; }
        .btn-icon { width: 44px; height: 44px; padding: 0; }
        .btn-ghost { background: rgba(0, 255, 136, 0.05); color: var(--green); }
        .btn-ghost:hover { background: var(--green); color: black; box-shadow: 0 0 20px var(--green-glow); border-color: var(--green); }

        .viewer-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 80px 40px 40px; }
        .viewer-content img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .viewer-content video, .viewer-content iframe { border: 1px solid var(--green); box-shadow: 0 0 30px var(--green-glow); border-radius: 8px; background: black; max-width: 100%; max-height: 100%; width: 90%; height: 90%; }
        
        .viewer-content pre {
            max-width: 90%; max-height: 90%; padding: 32px; background: rgba(0, 255, 136, 0.02);
            border: 1px solid var(--glass-bd); border-radius: 8px; overflow: auto;
            color: var(--green); font-family: var(--mono); font-size: 13px; line-height: 1.6;
        }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 56px; height: 56px; background: rgba(0, 255, 136, 0.05); border: 1px solid var(--glass-bd); border-radius: 50%; color: var(--green); font-size: 24px; cursor: pointer; opacity: 0; transition: all 0.2s; z-index: 5; backdrop-filter: blur(10px); }
        .viewer:hover .nav-btn { opacity: 1; }
        .nav-btn:hover { background: var(--green); color: black; box-shadow: 0 0 20px var(--green-glow); }
        .nav-prev { left: 32px; } .nav-next { right: 32px; }

        .viewer-counter { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); border: 1px solid var(--glass-bd); padding: 8px 16px; border-radius: 4px; font-family: var(--mono); font-size: 12px; color: var(--green); letter-spacing: 0.2em; text-transform: uppercase; }

        .toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--glass-bd); padding: 16px 28px; border-radius: 8px; font-family: var(--mono); font-size: 13px; font-weight: 500; animation: slideUp 0.3s ease; backdrop-filter: blur(10px); letter-spacing: 0.05em; text-transform: uppercase; }
        .toast.success { border-color: var(--green); color: var(--green); box-shadow: 0 0 20px var(--green-glow); }
        .toast.error { border-color: var(--red); color: var(--red); box-shadow: 0 0 20px rgba(255, 69, 58, 0.2); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .hidden { display: none !important; }
    </style>
</head>

<body>
    <div class="auth" id="auth">
        <div class="auth-logo">🔐</div>
        <h1>Vault</h1>
        <p>Enter access token from your phone</p>
        <input type="password" id="token" placeholder="••••••••" autocomplete="off" autofocus>
        <div class="auth-error hidden" id="auth-error"></div>
    </div>

    <div class="app" id="app">
        <div class="header">
            <div class="header-left">
                <span class="logo">Vault</span>
                <span class="badge">Encrypted</span>
            </div>
            <span class="file-count" id="count">—</span>
        </div>

        <div class="content">
            <div class="upload-area" id="upload" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">⬆</div>
                <h3>Drop files to encrypt</h3>
                <p>or click to browse</p>
                <input type="file" id="file-input" multiple>
            </div>

            <div class="progress-bar hidden" id="progress">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading files...</p>
            </div>

            <div class="grid hidden" id="grid"></div>

            <div class="empty hidden" id="empty">
                <div class="empty-icon">📁</div>
                <h3>Your vault is empty</h3>
                <p>Drop files above to encrypt them</p>
            </div>
        </div>
    </div>

    <div class="viewer" id="viewer">
        <div class="viewer-header">
            <span class="viewer-title" id="viewer-title">File</span>
            <div class="viewer-actions">
                <button class="btn btn-icon btn-ghost" onclick="downloadCurrent()" title="Download">⬇</button>
                <button class="btn btn-icon btn-ghost" onclick="closeViewer()" title="Close">✕</button>
            </div>
        </div>
        <div class="viewer-content" id="viewer-content"></div>
        <button class="nav-btn nav-prev" onclick="navPrev()">‹</button>
        <button class="nav-btn nav-next" onclick="navNext()">›</button>
        <div class="viewer-counter hidden" id="viewer-counter"></div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
        let token = '';
        let files = [];
        let currentIndex = -1;

        document.getElementById('token').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        function login() {
            token = document.getElementById('token').value.trim();
            if (!token) return;

            fetch('/api/auth', {
                method: 'POST',
                headers: { 'X-Access-Token': token }
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('auth').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        loadFiles();
                    } else {
                        showError('Invalid token');
                    }
                })
                .catch(() => showError('Connection failed'));
        }

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function loadFiles() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('grid').classList.add('hidden');
            document.getElementById('empty').classList.add('hidden');

            fetch('/api/files', { headers: { 'X-Access-Token': token } })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading').classList.add('hidden');
                    files = data.files || [];

                    document.getElementById('count').textContent = files.length + ' file' + (files.length !== 1 ? 's' : '');

                    if (files.length === 0) {
                        document.getElementById('empty').classList.remove('hidden');
                        return;
                    }

                    document.getElementById('grid').classList.remove('hidden');
                    renderGrid();
                });
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = files.map((f, i) => `
                <div class="card" onclick="openViewer(${i})">
                    <div class="card-preview">
                        ${f.mimeType.startsWith('image/') ?
                    `<img src="/api/files/${f.id}/view" loading="lazy" alt="">` :
                    getIcon(f.mimeType)}
                    </div>
                    <div class="card-info">
                        <div class="card-name">${esc(f.name)}</div>
                        <div class="card-meta">${f.formattedSize}</div>
                    </div>
                </div>
            `).join('');
        }

        function getIcon(mime) {
            if (mime.startsWith('image/')) return '🖼';
            if (mime.startsWith('video/')) return '▶️';
            if (mime.startsWith('audio/')) return '🎵';
            if (mime.includes('pdf')) return '📄';
            if (mime.includes('text')) return '📝';
            if (mime.includes('zip') || mime.includes('rar')) return '📦';
            return '📁';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function openViewer(index) {
            if (files.length === 0) return;
            currentIndex = index;
            showFile(files[index]);
            document.getElementById('viewer').classList.add('open');
            document.body.style.overflow = 'hidden';
            updateCounter();
        }

        function closeViewer() {
            document.getElementById('viewer').classList.remove('open');
            document.getElementById('viewer-content').innerHTML = '';
            document.body.style.overflow = '';
            currentIndex = -1;
        }

        function navPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                showFile(files[currentIndex]);
                updateCounter();
            }
        }

        function navNext() {
            if (currentIndex < files.length - 1) {
                currentIndex++;
                showFile(files[currentIndex]);
                updateCounter();
            }
        }

        function updateCounter() {
            const el = document.getElementById('viewer-counter');
            if (files.length > 1) {
                el.textContent = (currentIndex + 1) + ' / ' + files.length;
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        function showFile(f) {
            const content = document.getElementById('viewer-content');
            const url = '/api/files/' + f.id + '/view';

            document.getElementById('viewer-title').textContent = f.name;
            content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            if (f.mimeType.startsWith('image/')) {
                const img = new Image();
                img.onload = () => { content.innerHTML = ''; content.appendChild(img); };
                img.onerror = () => content.innerHTML = '<p style="color:var(--white-50)">Failed to load image</p>';
                img.src = url;
            } else if (f.mimeType.startsWith('video/')) {
                content.innerHTML = `<video controls autoplay playsinline><source src="${url}" type="${f.mimeType}"></video>`;
            } else if (f.mimeType.startsWith('audio/')) {
                content.innerHTML = `<audio controls autoplay><source src="${url}" type="${f.mimeType}"></audio>`;
            } else if (f.mimeType.includes('pdf')) {
                content.innerHTML = `<iframe src="${url}"></iframe>`;
            } else if (f.mimeType.includes('text')) {
                fetch(url).then(r => r.text()).then(txt => {
                    content.innerHTML = '<pre></pre>';
                    content.querySelector('pre').textContent = txt;
                }).catch(() => content.innerHTML = '<p style="color:var(--white-50)">Failed to load</p>');
            } else {
                content.innerHTML = '<div style="text-align:center;color:var(--white-50)"><p style="font-size:48px;margin-bottom:16px;">📁</p><p>Preview not available</p><p style="font-size:13px;margin-top:8px">Click download to view this file</p></div>';
            }
        }

        function downloadCurrent() {
            if (currentIndex >= 0) download(files[currentIndex]);
        }

        function download(f) {
            const a = document.createElement('a');
            a.href = '/api/files/' + f.id + '/download';
            a.download = f.name;
            a.click();
            toast('Downloading ' + f.name);
        }

        // Upload
        const uploadArea = document.getElementById('upload');
        const fileInput = document.getElementById('file-input');

        ['dragenter', 'dragover'].forEach(e => uploadArea.addEventListener(e, ev => {
            ev.preventDefault();
            uploadArea.classList.add('drag');
        }));

        ['dragleave', 'drop'].forEach(e => uploadArea.addEventListener(e, ev => {
            ev.preventDefault();
            uploadArea.classList.remove('drag');
        }));

        uploadArea.addEventListener('drop', e => {
            if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) uploadFiles(e.target.files);
        });

        function uploadFiles(fileList) {
            const progress = document.getElementById('progress');
            const fill = document.getElementById('progress-fill');
            let i = 0;

            function next() {
                if (i >= fileList.length) {
                    progress.classList.add('hidden');
                    fill.style.width = '0';
                    loadFiles();
                    return;
                }

                const file = fileList[i];
                progress.classList.remove('hidden');

                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/upload');
                xhr.setRequestHeader('X-Access-Token', token);
                xhr.setRequestHeader('X-File-Name', encodeURIComponent(file.name));
                xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');

                xhr.upload.onprogress = e => {
                    if (e.lengthComputable) {
                        fill.style.width = Math.round(e.loaded / e.total * 100) + '%';
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        toast('Encrypted: ' + file.name, 'success');
                    } else {
                        toast('Failed: ' + file.name, 'error');
                    }
                    i++;
                    next();
                };

                xhr.onerror = () => {
                    toast('Upload failed', 'error');
                    i++;
                    next();
                };

                xhr.send(file);
            }

            next();
        }

        function toast(msg, type = '') {
            const el = document.createElement('div');
            el.className = 'toast ' + type;
            el.textContent = msg;
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.3s';
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (currentIndex >= 0) {
                if (e.key === 'Escape') closeViewer();
                if (e.key === 'ArrowLeft') navPrev();
                if (e.key === 'ArrowRight') navNext();
            }
        });

        // Touch swipe for gallery
        let touchStartX = 0;
        document.getElementById('viewer-content').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.getElementById('viewer-content').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) navPrev();
                else navNext();
            }
        }, { passive: true });
    </script>
